name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ahmeddamouad/your_ai_lawyer

jobs:
  # =====================
  # Build & Push to GHCR
  # =====================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest

  # =====================
  # Deploy to Azure VM
  # =====================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            echo "=== Deploying Moroccan Legal AI Chatbot ==="

            cd /opt/moroccan-legal-ai

            # Pull latest code (for docker-compose.yml changes)
            echo "Pulling latest code..."
            git pull origin main

            # Pull latest images from GHCR
            echo "Pulling latest images..."
            docker-compose pull backend frontend

            # Restart services
            echo "Restarting services..."
            docker-compose up -d

            # Wait for services to start
            sleep 10

            # Show status
            echo "=== Container Status ==="
            docker-compose ps

            # Show recent logs
            echo "=== Recent Logs ==="
            docker-compose logs --tail=20

            echo "=== Deployment Complete ==="
